spring.application.name=gateway-service
server.port=9091

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# =============================================================================
# Resilience4j Circuit Breaker
# =============================================================================
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=10s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED

# Circuit breaker instances (share default config)
resilience4j.circuitbreaker.instances.iamServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.farmerServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.cropServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.inputServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.subsidyServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.produceServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.reportServiceCircuit.base-config=default
resilience4j.circuitbreaker.instances.notificationServiceCircuit.base-config=default

# =============================================================================
# Resilience4j Time Limiter
# =============================================================================
resilience4j.timelimiter.configs.default.timeout-duration=3s
resilience4j.timelimiter.configs.report-service.timeout-duration=10s

# =============================================================================
# Resilience4j Rate Limiter
# Default: 20 requests per second (in-memory, no Redis needed)
# timeout-duration=0 means reject immediately without waiting when limit is hit
# =============================================================================
resilience4j.ratelimiter.configs.default.limit-for-period=20
resilience4j.ratelimiter.configs.default.limit-refresh-period=1s
resilience4j.ratelimiter.configs.default.timeout-duration=0

# Rate limiter instances per service (all share default config)
resilience4j.ratelimiter.instances.iamServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.farmerServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.cropServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.inputServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.subsidyServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.produceServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.reportServiceRateLimiter.base-config=default
resilience4j.ratelimiter.instances.notificationServiceRateLimiter.base-config=default
